.knowledge-card h2 { margin-top: 9px; font-size: 25px; }
.knowledge-card section { margin-top: 16px; }
.knowledge-card section h3 small { color: var(--muted); font-size: 10px; letter-spacing: 0; }
.knowledge-card section p,
.knowledge-card li { color: var(--muted); }
.pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.pros-cons > div { padding: 12px; border-radius: 10px; background: var(--surface-2); }
.knowledge-card footer,
.skill-card footer { margin-top: 18px; padding-top: 13px; display: flex; flex-wrap: wrap; gap: 10px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; }
.no-results { padding: 36px; color: var(--muted); text-align: center; }

.term-list { display: grid; gap: 9px; }
.term-row {
  width: 100%;
  padding: 15px 17px;
  display: grid;
  grid-template-columns: minmax(170px, 0.35fr) minmax(320px, 1fr) auto;
  align-items: center;
  gap: 18px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--surface);
  cursor: pointer;
  text-align: left;
}
.term-row:hover { border-color: var(--brand); }
.term-row > span:first-child { display: grid; }
.term-row small,
.term-row > span:nth-child(2) { color: var(--muted); }
.term-row b { color: var(--brand); font-size: 11px; }

.prompt-layout { display: grid; grid-template-columns: 250px minmax(0, 1fr); gap: 16px; align-items: start; }
.prompt-list { position: sticky; top: 150px; display: grid; gap: 6px; }
.prompt-list button { padding: 10px; display: grid; grid-template-columns: 28px 1fr; gap: 6px; border: 1px solid transparent; border-radius: 10px; background: transparent; cursor: pointer; text-align: left; }
.prompt-list button span { color: var(--muted); font: 11px/1.8 var(--mono); }
.prompt-list button strong { font-size: 13px; }
.prompt-list button:hover,
.prompt-list button.is-active { border-color: var(--line); color: var(--brand-strong); background: var(--surface); }
.prompt-workspace { min-width: 0; }
.prompt-intro { padding: 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow-sm); }
.prompt-intro p { color: var(--muted); }
.stage-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end; }
.warning-box { margin: 12px 0; color: var(--amber); border-color: rgba(155, 93, 0, 0.25); background: var(--amber-soft); }
.prompt-fields { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 11px; }
.field-card { min-width: 0; padding: 16px; border: 1px solid var(--line); border-radius: 13px; background: var(--surface); }
.field-heading { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.field-heading > label:first-child { font-weight: 800; }
.required { margin-left: 5px; color: var(--red); font-size: 10px; }
.unknown-toggle { display: flex; gap: 5px; align-items: center; color: var(--muted); font-size: 12px; }
.field-card p,
.field-card small { color: var(--muted); }
.field-card input:not([type="checkbox"]),
.field-card textarea { width: 100%; padding: 9px 10px; border: 1px solid var(--line); border-radius: 9px; background: white; }
.field-card textarea { min-height: 100px; resize: vertical; }
.field-card input:disabled,
.field-card textarea:disabled { opacity: 0.56; background: var(--surface-3); }
.prompt-preview-panel { margin-top: 13px; padding: 18px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow-sm); }
.panel-heading { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.panel-heading h3 { font-size: 19px; }
.validation-error { margin: 12px 0; color: var(--red); border-color: rgba(183, 53, 67, 0.25); background: var(--red-soft); }
.prompt-preview-panel pre { max-height: 640px; margin: 15px 0 0; padding: 17px; overflow: auto; border: 1px solid var(--line); border-radius: 11px; background: #111827; color: #e8eef8; white-space: pre-wrap; overflow-wrap: anywhere; font-size: 12px; line-height: 1.65; }
.acceptance-details { margin-top: 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); }
.acceptance-details summary { padding: 13px 16px; cursor: pointer; font-weight: 800; }
.detail-columns { padding: 0 16px 16px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.detail-columns > div { padding: 12px; border-radius: 9px; background: var(--surface-2); }
.detail-columns li { color: var(--muted); }

.update-panel,
.inventory-panel { margin: 0 0 12px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.update-panel > div,
.inventory-panel > div:first-child { display: grid; }
.update-panel span,
.inventory-panel span { color: var(--muted); }
.skills-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
.skill-heading { display: flex; justify-content: space-between; gap: 14px; }
.skill-heading > div:first-child span { color: var(--muted); font-size: 12px; }
.skill-heading h2 { margin-top: 2px; font-size: 24px; overflow-wrap: anywhere; }
.score-badge { min-width: 62px; height: 62px; display: grid; place-items: center; align-content: center; border-radius: 13px; color: var(--brand); background: var(--brand-soft); }
.score-badge strong { font-size: 23px; line-height: 1; }
.score-badge span { font-size: 9px; }
.status-row { margin: 12px 0; display: flex; flex-wrap: wrap; gap: 6px; }
.status-row .risk-low { color: var(--green); background: var(--green-soft); }
.status-row .risk-medium { color: var(--amber); background: var(--amber-soft); }
.status-row .risk-high { color: var(--red); background: var(--red-soft); }
.status-row .local-found { color: var(--violet); background: var(--violet-soft); }
.skill-card > p,
.skill-section p,
.skill-section li { color: var(--muted); }
.skill-card dl { margin: 14px 0; display: grid; gap: 6px; }
.skill-card dl > div { padding: 7px 0; display: grid; grid-template-columns: 88px minmax(0, 1fr); gap: 8px; border-bottom: 1px solid var(--line); }
.skill-card dt { color: var(--muted); }
.skill-card dd { min-width: 0; margin: 0; overflow-wrap: anywhere; }
.skill-section { margin-top: 14px; }
.install-box { margin-top: 14px; padding: 13px; border-radius: 10px; background: var(--surface-2); }
.install-box p { color: var(--muted); }
.command-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: white; }
.command-row code { padding: 9px; overflow-x: auto; }
.command-row button { border: 0; border-left: 1px solid var(--line); background: var(--brand-soft); color: var(--brand); cursor: pointer; font-weight: 750; }

.about-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 13px; }
.about-grid article { padding: 22px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow-sm); }
.about-grid article p { color: var(--muted); }
.about-grid article h2 { font-size: 23px; }
.source-board { margin-top: 16px; padding: 22px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); }
.source-board > div { margin-top: 13px; display: flex; flex-wrap: wrap; gap: 9px; }
.source-board a { padding: 7px 10px; border: 1px solid var(--line); border-radius: 9px; text-decoration: none; }

.status-badge { width: fit-content; padding: 4px 8px; border-radius: 999px; font-size: 10px; font-weight: 800; white-space: nowrap; }
.status-not_started { color: var(--muted); background: var(--surface-3); }
.status-in_progress { color: var(--brand); background: var(--brand-soft); }
.status-blocked { color: var(--red); background: var(--red-soft); }
.status-review { color: var(--amber); background: var(--amber-soft); }
.status-done { color: var(--green); background: var(--green-soft); }
.status-not_applicable { color: var(--violet); background: var(--violet-soft); }

.site-footer { width: min(100%, var(--content)); margin: 0 auto; padding: 22px 24px 38px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; }
.site-footer button { padding: 0; border: 0; color: var(--brand); background: transparent; cursor: pointer; }

.modal-backdrop {
  position: fixed;
  z-index: 400;
  inset: 0;
  padding: 24px;
  display: grid;
  place-items: center;
  overflow: auto;
  background: rgba(13, 23, 40, 0.56);
  backdrop-filter: blur(7px);
}
.search-modal,
.term-dialog,
.wizard {
  width: min(100%, 780px);
  max-height: calc(100vh - 48px);
  overflow: auto;
  padding: 22px;
  border: 1px solid var(--line);
  border-radius: 20px;
  background: var(--surface);
  box-shadow: 0 28px 90px rgba(10, 24, 46, 0.28);
}
.modal-heading,
.wizard-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
.search-modal > input { margin-top: 13px; }
.search-results { margin-top: 10px; display: grid; gap: 6px; }
.search-results > p { color: var(--muted); text-align: center; }
.search-results button { padding: 12px; display: grid; grid-template-columns: 62px minmax(0, 1fr); gap: 3px 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--surface-2); cursor: pointer; text-align: left; }
.search-results button span { grid-row: 1 / 3; color: var(--brand); font-size: 11px; font-weight: 800; }
.search-results button small { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.term-dialog { width: min(100%, 650px); }
.term-dialog section { margin-top: 19px; }
.term-dialog section p,
.aliases { color: var(--muted); }
.term-meta { margin: 19px 0; display: flex; flex-wrap: wrap; gap: 6px; }
.wizard { width: min(100%, 920px); }
.wizard-progress { height: 6px; margin: 17px 0; overflow: hidden; border-radius: 999px; background: var(--surface-3); }
.wizard-progress span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--brand), var(--violet)); transition: width 180ms ease; }
.wizard-body { min-height: 360px; }
.project-name-field { margin-bottom: 15px; display: grid; gap: 6px; font-weight: 800; }
.project-name-field input { min-height: 47px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; }
.option-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.option-card { min-height: 92px; padding: 14px; display: grid; gap: 4px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface-2); cursor: pointer; text-align: left; }
.option-card span { color: var(--muted); }
.option-card:hover,
.option-card.is-selected { border-color: var(--brand); box-shadow: inset 0 0 0 1px var(--brand); background: var(--brand-soft); }
.wizard-help { color: var(--muted); }
.wizard-footer { margin-top: 18px; padding-top: 15px; display: flex; justify-content: space-between; border-top: 1px solid var(--line); }
.toast { position: fixed; z-index: 600; right: 20px; bottom: 20px; max-width: min(430px, calc(100vw - 40px)); padding: 13px 16px; border-radius: 11px; color: white; background: #162033; box-shadow: var(--shadow); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { scroll-behavior: auto !important; transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
}

@media (max-width: 980px) {
  .header-top { align-items: flex-start; }
  .header-actions { flex-wrap: wrap; }
  .search-button { order: 3; width: 100%; }
  .entry-grid,
  .route-overview { grid-template-columns: 1fr; }
  .entry-card { min-height: 180px; }
  .route-option-grid { grid-template-columns: 1fr; }
  .gate-row { grid-template-columns: 1fr; }
  .prompt-layout { grid-template-columns: 1fr; }
  .prompt-list { position: static; grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .prompt-list button { grid-template-columns: 24px 1fr; }
  .catalog-grid,
  .skills-grid { grid-template-columns: 1fr; }
}

@media (max-width: 720px) {
  html { scroll-padding-top: 255px; }
  .header-top { padding: 10px 14px; flex-direction: column; gap: 9px; }
  .header-actions { width: 100%; justify-content: flex-start; }
  .project-switcher { min-width: 0; flex: 1 1 160px; }
  .project-switcher select { width: 100%; max-width: none; }
  .network-state { margin-left: auto; }
  .brand small { white-space: normal; }
  .primary-nav {
    padding: 0 14px 8px;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    overflow: visible;
  }
  .primary-nav button {
    min-width: 0;
    padding-inline: 6px;
    white-space: nowrap;
  }
  .main-content { padding: 24px 14px 100px; }
  .hero-panel { padding: 25px 20px; border-radius: 20px; }
  .hero-panel h1 { font-size: clamp(31px, 9.8vw, 39px); }
  .hero-copy { font-size: 15px; line-height: 1.62; }
  .entry-grid { grid-template-columns: 1fr; }
  .entry-card { min-height: 164px; }
  .route-header,
  .view-heading,
  .timeline-heading { align-items: flex-start; flex-direction: column; }
  .route-header .button-row { width: 100%; }
  .source-chip,
  .catalog-version { white-space: normal; }
  .route-overview { gap: 9px; }
  .route-option-grid { padding: 12px; }
  .stage-rail { grid-template-columns: repeat(8, 150px); }
  .stage-card > summary { grid-template-columns: auto minmax(0, 1fr); padding: 14px; }
  .stage-card > summary .status-badge { grid-column: 2; }
  .stage-body { padding: 0 14px 14px; }
  .stage-controls { align-items: flex-start; flex-direction: column; }
  .stage-terms { justify-content: flex-start; }
  .stage-footer { align-items: flex-start; flex-direction: column; }
  .next-action { bottom: 8px; align-items: stretch; flex-direction: column; }
  .next-action .button-row { width: 100%; }
  .next-action .button { flex: 1; }
  .filter-bar { align-items: stretch; flex-direction: column; }
  .search-field { flex-basis: auto; }
  .term-row { grid-template-columns: 1fr; gap: 7px; }
  .term-row b { justify-self: start; }
  .prompt-list { grid-template-columns: 1fr 1fr; }
  .prompt-fields { grid-template-columns: 1fr; }
  .prompt-intro,
  .panel-heading { align-items: flex-start; flex-direction: column; }
  .stage-tags { justify-content: flex-start; }
  .panel-heading .button-row { width: 100%; }
  .panel-heading .button { flex: 1; }
  .detail-columns { grid-template-columns: 1fr; }
  .update-panel,
  .inventory-panel { align-items: stretch; flex-direction: column; }
  .inventory-panel .button-row { width: 100%; }
  .inventory-panel .button { flex: 1; }
  .skill-card dl > div { grid-template-columns: 74px minmax(0, 1fr); }
  .about-grid { grid-template-columns: 1fr; }
  .site-footer { padding-inline: 14px; }
  .modal-backdrop { padding: 10px; place-items: start center; }
  .search-modal,
  .term-dialog,
  .wizard { max-height: calc(100vh - 20px); padding: 17px; border-radius: 15px; }
  .option-grid { grid-template-columns: 1fr; }
  .wizard-body { min-height: 420px; }
}

@media (max-width: 420px) {
  .header-actions { display: grid; grid-template-columns: minmax(0, 1fr) auto; }
  .search-button { grid-column: 1 / -1; }
  .language-switcher { justify-self: start; }
  .prompt-list { grid-template-columns: 1fr; }
  .button-row.compact { align-items: stretch; flex-direction: column; }
  .next-action .button-row.compact {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .route-header .button-row.compact { display: grid; grid-template-columns: 1fr 1fr; }
  .route-header .button-row.compact .button { width: 100%; }
  .field-heading { align-items: flex-start; flex-direction: column; }
  .skill-heading { align-items: flex-start; }
  .score-badge { min-width: 56px; width: 56px; height: 56px; }
}

@media print {
  .site-header,
  .site-footer,
  .next-action,
  .button,
  .text-button,
  .search-button { display: none !important; }
  body { background: white; }
  .main-content { width: 100%; padding: 0; }
  .stage-card { break-inside: avoid; box-shadow: none; }
}

 be reviewed as diffs","Branches, pull requests, and CI are supported"],cons:["Committed secrets persist in history","Branches and conflicts require basic operating discipline"],chooseWhen:"Any website will be maintained, shared, reviewed, or deployed over time.",avoidWhen:"Version control should generally not be skipped, even for a solo project."},astro:{what:"A content-focused web framework that sends little JavaScript by default and adds interactive components where needed.",pros:["Well suited to company sites, blogs, and documentation","Produces straightforward static output","Can adopt React or Vue components incrementally"],cons:["Complex application state is not its primary strength","Teams still need to understand builds and content models"],chooseWhen:"Content, performance, and code ownership matter more than extensive application state.",avoidWhen:"The product depends on extensive signed-in state, real-time behavior, or a unified React application ecosystem."},nextjs:{what:"A React framework with routing, rendering, data access, and server capabilities.",pros:["A broad React ecosystem","Static and dynamic pages can coexist","Can grow into a full web application"],cons:["More concepts and deployment surface than a static site","Poor data boundaries can spread complexity across client and server"],chooseWhen:"The project needs sign-in, server logic, dynamic data, or a React-experienced team.",avoidWhen:"The site contains only a few stable content pages or operators require fully visual editing."},react:{what:"A JavaScript library for building user interfaces from components.",pros:["Large component ecosystem","Strong for complex interactions","Compatible with many frameworks and design systems"],cons:["Not a complete website architecture","Routing, data, state, and performance still need engineering decisions"],chooseWhen:"The interface is interactive, the team knows React, or the chosen framework uses React.",avoidWhen:"A static page needs no client runtime or React is being added only because it is popular."},"vue-nuxt":{what:"Vue is a progressive UI framework; Nuxt adds full application and server-rendering conventions.",pros:["Templates are approachable for many newcomers","Supports a path from small interactions to full apps","Nuxt supplies useful conventions"],cons:["React components and talent are not directly interchangeable","State, server, and deployment boundaries still require care"],chooseWhen:"The team knows Vue or the existing component and content system uses Vue/Nuxt.",avoidWhen:"The team and dependencies are React-based and the switch is only experimental."},vite:{what:"A modern frontend development server and build tool used by multiple frameworks.",pros:["Fast development feedback","Mature configuration ecosystem","Useful for static frontends and component applications"],cons:["It is not routing, a CMS, or a backend","Choosing Vite does not choose the application architecture"],chooseWhen:"A lightweight frontend build, framework template, or library-development setup is needed.",avoidWhen:"It is being treated as a complete solution for content, data, and deployment."},tailwind:{what:"A CSS framework for composing styles from utility classes in markup.",pros:["Centralized design tokens and responsive conventions","Fast style iteration inside components","Works well with explicit component boundaries"],cons:["Markup can become class-dense","Inconsistency remains possible without design constraints","It does not replace semantic HTML or accessibility"],chooseWhen:"The team accepts utility classes and maintains component and token conventions.",avoidWhen:"Content authors edit raw HTML directly or the project needs very little styling."},shadcn:{what:"A component distribution approach that copies editable component source into a project.",pros:["High source-code ownership","A fast React UI baseline","Components can be deeply adapted to brand and business needs"],cons:["The project owns maintenance after copying","Default-looking interfaces are common","Content and flow design remain necessary"],chooseWhen:"A React project needs editable starter components and can maintain their source.",avoidWhen:"The project is not React-based or expects a vendor to manage component upgrades completely."},wordpress:{what:"An open-source content management system extended through themes and plugins.",pros:["Mature editorial administration","Widely available operator experience","Large ecosystem"],cons:["Themes and plugins expand the security and maintenance surface","Performance and consistency depend on combination quality","Heavy customization can accumulate debt"],chooseWhen:"Operators update content frequently and the team can maintain WordPress.",avoidWhen:"Minimal maintenance and attack surface are priorities, or application logic does not fit a plugin model."},webflow:{what:"A commercial website platform combining visual design, CMS features, and hosting.",pros:["Design and publishing are integrated","Operators can edit directly","Marketing sites can iterate quickly"],cons:["Platform capabilities, prices, and export boundaries can change","Complex business logic is constrained","Migration needs advance verification"],chooseWhen:"Visual editing and rapid marketing publishing matter more than complete code control.",avoidWhen:"The core product requires complex permissions, transactions, or a highly portable backend."},framer:{what:"A visual website builder and hosted publishing platform oriented toward design-led marketing sites.",pros:["Fast visual iteration","Integrated hosting and publishing","Useful for small marketing teams"],cons:["Platform and pricing boundaries can change","Complex application logic is limited","Portability should be verified before commitment"],chooseWhen:"A design-heavy landing page or portfolio must launch quickly with visual editing.",avoidWhen:"The site needs complex data, permissions, or a backend that must remain platform-independent."},shopify:{what:"A managed commerce platform for storefronts, products, orders, payments, and operations.",pros:["Reuses mature commerce infrastructure","Large theme and app ecosystem","Operations tooling is built in"],cons:["Fees, apps, and platform rules affect cost and control","Custom workflows can require significant integration","Regional capabilities need verification"],chooseWhen:"The primary requirement is selling products without building a transaction system from scratch.",avoidWhen:"The business model cannot fit platform product, order, or fulfillment rules."},supabase:{what:"A managed backend platform built around PostgreSQL with authentication, storage, realtime, and server functions.",pros:["Speeds up common backend setup","Uses PostgreSQL rather than a proprietary database model","Local and hosted workflows are available"],cons:["Permissions and row-level security still require careful design","A managed service does not remove operations responsibility","Costs and limits change"],chooseWhen:"A small team needs a PostgreSQL-based backend with common platform services.",avoidWhen:"The team cannot own authorization, data modeling, migration, and production recovery."},postgresql:{what:"An open-source relational database with transactions, constraints, indexing, and a large extension ecosystem.",pros:["Strong data integrity and query capability","Portable across many hosts","Fits structured business data"],cons:["Schema, indexes, backups, and migrations require expertise","It is not a complete application backend"],chooseWhen:"The system has durable structured data, relationships, and transactional rules.",avoidWhen:"No server-side state is needed or the team cannot operate a production database."},vercel:{what:"A managed deployment platform for frontend frameworks, static assets, and server functions.",pros:["Fast Git-based deployments","Good integration with common frontend frameworks","Preview deployments support review"],cons:["Prices, limits, and runtime behavior can change","Architecture can become vendor-specific","Regional requirements need validation"],chooseWhen:"The project benefits from managed frontend deployment and preview environments.",avoidWhen:"Strict infrastructure portability or unsupported regional requirements are hard constraints."},cloudflare:{what:"Cloudflare Pages hosts web frontends, while Workers runs code on Cloudflare's distributed platform.",pros:["Global edge delivery","Static hosting and serverless logic can share a platform","Security and network services are available"],cons:["Worker runtime constraints differ from a conventional server","Platform configuration adds complexity","Regional behavior requires direct testing"],chooseWhen:"Global edge delivery or lightweight edge logic is valuable and the runtime fits.",avoidWhen:"The application depends on unsupported Node behavior or a conventional long-running server."},netlify:{what:"A managed platform for static sites, frontend deployments, functions, and previews.",pros:["Straightforward Git-based publishing","Preview deployments","Common frontend workflows are integrated"],cons:["Limits, prices, and features change","Functions and add-ons can create platform coupling","Not every backend workload fits"],chooseWhen:"A static or frontend-focused site needs managed deployment and previews.",avoidWhen:"The project needs infrastructure control or backend behavior outside the platform model."},"github-pages":{what:"Static website hosting served from a GitHub repository or Actions build.",pros:["Simple for public static projects","Works directly with repository workflows","No application server is required"],cons:["Static files only","Public URLs are accessible to anyone who knows them","No private application data layer is provided"],chooseWhen:"The output is fully static and public access is acceptable.",avoidWhen:"The site requires private access, server secrets, dynamic APIs, or server-side user data."},playwright:{what:"A browser-automation and end-to-end testing framework for Chromium, Firefox, and WebKit.",pros:["Tests realistic user flows","Supports screenshots and traces","Useful across multiple browser engines"],cons:["End-to-end tests cost more to maintain than unit tests","Unstable selectors and environments can create flakes"],chooseWhen:"Critical browser journeys and regressions need repeatable evidence.",avoidWhen:"A small pure function is better covered by a fast unit test."},lighthouse:{what:"An automated audit tool for selected performance, accessibility, best-practice, and SEO checks.",pros:["Fast repeatable baseline","Provides diagnostic detail","Useful in local and CI workflows"],cons:["Scores vary by environment","Automated checks cover only part of accessibility and user experience"],chooseWhen:"A repeatable diagnostic baseline is needed and results are interpreted with context.",avoidWhen:"A single score is being treated as proof of compliance or real-user quality."},sentry:{what:"A hosted observability product for errors, performance traces, releases, and related diagnostics.",pros:["Connects production errors to releases and context","Supports alerting and issue triage","Client and server SDKs are available"],cons:["Telemetry can contain sensitive data without careful filtering","Sampling, retention, and cost need governance","It adds a third-party dependency"],chooseWhen:"A dynamic site needs production error visibility and the data policy is configured.",avoidWhen:"Telemetry privacy, retention, and ownership have not been reviewed."},"github-actions":{what:"GitHub's repository automation service for workflows such as tests, builds, and deployments.",pros:["Runs checks next to repository changes","Large action ecosystem","Supports protected release workflows"],cons:["Third-party actions and tokens expand supply-chain risk","Workflow permissions require careful scoping"],chooseWhen:"Repository events should trigger repeatable verification or deployment.",avoidWhen:"Workflow permissions and third-party action references have not been reviewed."},codex:{what:"An AI coding agent that can inspect a repository, edit code, run commands, and collaborate on engineering tasks within granted boundaries.",pros:["Can connect implementation with repository context and verification","Useful for scoped changes, reviews, and debugging","Can preserve an auditable code diff"],cons:["It can be wrong or overreach without clear scope and tests","It cannot supply missing business authority or private facts","External writes still require explicit authorization"],chooseWhen:"The task, repository boundary, relevant context, and verification path are clear.",avoidWhen:"The request depends on unverified business facts, missing authority, or secrets placed in prompts."}},oh={"Web \u57FA\u7840":"Web fundamentals",\u5DE5\u7A0B\u57FA\u7840:"Engineering fundamentals",\u524D\u7AEF\u6846\u67B6:"Frontend framework",\u524D\u7AEF\u5E93:"Frontend library",\u6784\u5EFA\u5DE5\u5177:"Build tooling",\u6837\u5F0F\u7CFB\u7EDF:"Styling system",\u7EC4\u4EF6\u65B9\u6848:"Component approach","CMS / \u5EFA\u7AD9":"CMS / website platform",\u53EF\u89C6\u5316\u5EFA\u7AD9:"Visual website builder",\u7535\u5546:"E-commerce",\u540E\u7AEF\u670D\u52A1:"Backend service",\u6570\u636E\u5E93:"Database",\u6258\u7BA1\u4E0E\u90E8\u7F72:"Hosting and deployment",\u6D4B\u8BD5\u4E0E\u8D28\u91CF:"Testing and quality",\u76D1\u63A7\u4E0E\u8FD0\u7EF4:"Monitoring and operations",\u5DE5\u7A0B\u81EA\u52A8\u5316:"Engineering automation","AI \u7F16\u7A0B":"AI coding",\u9700\u6C42\u4E0E\u8BBE\u8BA1:"Requirements and design","AI \u5DE5\u7A0B":"AI engineering",\u67B6\u6784:"Architecture",\u5185\u5BB9\u4E0E\u4FE1\u606F\u67B6\u6784:"Content and information architecture",\u524D\u7AEF:"Frontend",\u8D28\u91CF:"Quality",\u5185\u5BB9\u4E0E\u589E\u957F:"Content and growth",\u53D1\u5E03\u4E0E\u7F51\u7EDC:"Release and networking",\u5B89\u5168:"Security",\u6570\u636E:"Data",\u5DE5\u7A0B\u5316:"Engineering",\u6D4B\u8BD5:"Testing",\u53D1\u5E03\u4E0E\u8FD0\u7EF4:"Release and operations"},Py={spec:["Spec","A written agreement describing the problem, scope, constraints, behavior, and acceptance criteria.","It gives AI a testable target and reduces accidental scope expansion."],sdd:["SDD (Spec-Driven Development in this guide)","A workflow in which an explicit specification guides implementation and verification.","The phrase is used in different ways, so this guide states its intended meaning."],"vibe-coding":["Vibe Coding","An informal term for building software by directing AI mainly through natural-language conversation.","Fast generation still needs requirements, review, testing, and accountable decisions."],prd:["PRD","A product requirements document describing users, goals, requirements, constraints, and success criteria.","It can turn loose requests into reviewable product decisions before code is changed."],adr:["ADR","An architecture decision record that captures a decision, context, alternatives, and consequences.","It preserves why a technology choice was made and when it should be revisited."],sitemap:["Sitemap","A model of the pages or content areas of a site and how they relate.","It prevents navigation and page count from being invented during implementation."],wireframe:["Wireframe","A low-fidelity layout showing content hierarchy and interaction without final visual styling.","It lets teams test structure before investing in polish."],prototype:["Prototype","A representation used to explore or test a product idea, flow, or interaction before production implementation.","It exposes misunderstandings while changes are still cheap."],"design-system":["Design System","A maintained collection of design principles, tokens, components, and usage guidance.","It helps AI-generated pages remain consistent and accessible across the product."],component:["Component","A reusable, bounded unit of user interface and behavior.","Clear components help scope AI changes and reduce repeated implementation."],responsive:["Responsive Web Design","An approach that adapts layout and content to different screens and user settings.","A desktop screenshot does not prove the site works on phones, zoomed views, or narrow windows."],"semantic-html":["Semantic HTML","HTML elements chosen for their meaning and structure rather than appearance alone.","Good semantics improve accessibility, maintainability, and machine understanding."],accessibility:["Accessibility","The practice of making products usable by people with a wide range of abilities and assistive technologies.","It requires real interaction checks; visual inspection and AI output alone are insufficient."],wcag:["WCAG","The Web Content Accessibility Guidelines published by W3C, organized around testable success criteria.","They provide a shared accessibility reference, but automated scans cannot prove full conformance."],seo:["SEO","Work that helps search engines crawl, understand, and present useful web content.","Technical markup cannot compensate for inaccurate, thin, or unsourced content."],geo:["GEO (Generative Engine Optimization)","An emerging, informal label for making content easier for generative search or answer systems to understand and cite.","The term and practices are evolving; clear structure and sourced facts are safer than unverified ranking claims."],domain:["Domain Name","A human-readable name mapped through DNS to internet services.","Domain ownership and access are release-critical assets that should not depend on one developer's account."],dns:["DNS","The distributed system that maps domain names to records used by internet services.","A deployment is not complete until DNS, certificates, rollback, and ownership are verified."],hosting:["Hosting","Infrastructure or a managed service that serves a website or application.","Hosting determines runtime capabilities, access model, regions, cost, and operational responsibility."],cdn:["CDN","A distributed network that caches or serves content closer to users.","It can improve delivery, but cache behavior, regions, and invalidation need testing."],https:["HTTPS / TLS","HTTP protected in transit with TLS, normally authenticated by a certificate.","It is essential for user trust and secure transport, but does not make an application secure by itself."],pwa:["PWA","A web application that uses web capabilities such as a manifest and service worker to provide installable or resilient experiences.","Offline and install behavior must be designed and tested rather than inferred from the presence of a manifest."],"service-worker":["Service Worker","A browser worker that can intercept requests and support caching, offline behavior, and background features.","A stale or overly broad cache can serve outdated code, so update and fallback behavior need tests."],api:["API","An interface through which software systems or components exchange requests and data.","AI needs explicit contracts, errors, authentication, and data boundaries to integrate an API safely."],rest:["REST","An architectural style for networked systems based on resources and standard HTTP semantics.","Calling an endpoint REST does not define its authorization, errors, versioning, or idempotency."],authn:["Authentication","The process of establishing who a user or system is.","Sign-in introduces account recovery, session, abuse, and privacy responsibilities."],authz:["Authorization","The decision about what an authenticated or anonymous actor may access or change.","A working login does not prove permissions are enforced on every server-side operation."],session:["Session","Server and client state used to associate a sequence of requests with an authenticated or ongoing interaction.","Expiration, renewal, revocation, storage, and theft risks must be designed explicitly."],cookie:["Cookie","A small value associated with a website that a browser stores and sends according to defined attributes.","Security, privacy, consent, and cross-site behavior depend on how the cookie is configured and used."],"local-storage":["localStorage","Browser storage scoped to an origin and retained until code or the user clears it.","It survives closing a page, but is device/browser-specific and is not safe storage for secrets."],database:["Database","A system for storing, organizing, querying, and protecting persistent data.","Choosing one creates schema, migration, backup, authorization, and recovery responsibilities."],schema:["Schema","A formal description of data structure, types, relationships, or validation rules.","It gives AI and code an explicit contract instead of guessing data shapes."],migration:["Database Migration","A controlled change to database structure or data between versions.","Production changes need compatibility, backup, rollback, and verification plans."],"ci-cd":["CI / CD","Automation that integrates changes through repeatable checks and prepares or performs delivery.","It makes quality and deployment steps reproducible, but permissions and release approval remain important."],lint:["Lint","Static analysis that flags selected code-quality, correctness, or style patterns.","It provides fast feedback but does not replace type, test, security, or product review."],"type-check":["Type Checking","Analysis that verifies values and operations against declared or inferred types.","It catches many integration mistakes but cannot prove the business behavior is correct."],"unit-test":["Unit Test","A focused test of a small unit of behavior with controlled dependencies.","It gives fast feedback for logic but cannot prove a real browser journey works."],"integration-test":["Integration Test","A test that verifies multiple components or systems work together at a defined boundary.","It catches contract and configuration failures that isolated tests miss."],e2e:["End-to-End Test","A test that exercises a user journey through the assembled system.","It provides valuable release evidence but should focus on critical paths to control maintenance cost."],uat:["UAT","User acceptance testing in which responsible business users evaluate the product against agreed criteria.","AI and developers cannot approve business correctness on behalf of the accountable owner."],"vertical-slice":["Vertical Slice","A small piece of work that delivers one user outcome across the necessary interface, logic, and data boundaries.","It keeps AI work reviewable and produces usable evidence sooner than layer-by-layer implementation."],mvp:["MVP","The minimum product needed to test a value hypothesis with real users or evidence.","It is not an excuse for unsafe or unverifiable work; minimum scope still needs minimum quality."],rollback:["Rollback","Returning a release or configuration to a previously working state.","A release is not safely reversible until triggers, steps, data handling, and owners are tested."],observability:["Observability","The ability to understand a system's internal state from outputs such as logs, metrics, traces, and events.","It supports diagnosis of failures that were not predicted in advance."],monitoring:["Monitoring","Ongoing checks of known signals, thresholds, and expected behavior.","Someone must own alerts and user-impact checks after deployment."],slo:["SLO / SLA","An SLO is an internal reliability target; an SLA is a formal service commitment that may include consequences.","Reliability language should use measured windows and explicit ownership instead of vague claims."],"rpo-rto":["RPO / RTO","RPO limits acceptable data loss in time; RTO limits acceptable recovery time.","They turn backup and recovery from \u201Cwe have backups\u201D into testable objectives."],"feature-flag":["Feature Flag","A controlled switch that changes feature availability without requiring a new code deployment.","Flags can reduce release risk but need ownership, cleanup, and authorization rules."],csp:["CSP","Content Security Policy is a browser security mechanism that restricts permitted content sources and behaviors.","It can reduce some injection impact but requires careful configuration and testing."],cors:["CORS","A browser mechanism through which a server declares which other origins may read selected responses.","It is not authentication and does not stop direct server requests."],secret:["Secret","A credential or sensitive value that grants access, such as an API key, password, token, or private key.","Secrets must stay out of prompts, public code, client bundles, logs, and screenshots."],"environment-variable":["Environment Variable","A named value supplied to a process outside its source code.","It can separate configuration from code, but client-exposed variables are still public and secret storage needs controls."],dependency:["Dependency","External code or a service on which a project relies.","Every dependency adds maintenance, licensing, security, and availability considerations."],"package-manager":["Package Manager","A tool that resolves, installs, locks, and updates software packages.","Lockfiles and reviewed install commands make environments more reproducible and reduce supply-chain ambiguity."],"ssr-ssg-csr":["SSR / SSG / CSR","Server-side rendering creates HTML per request, static generation creates it ahead of time, and client-side rendering creates much of it in the browser.","The choice affects hosting, caching, interactivity, failure modes, and how content is delivered."],"headless-cms":["Headless CMS","A content system that exposes content through an API while a separate frontend renders it.","It separates editorial work from presentation but adds modeling, integration, preview, and migration responsibilities."],webhook:["Webhook","An HTTP callback sent when an event occurs in another system.","Delivery can be duplicated, delayed, forged, or fail, so verification, retries, and idempotency matter."],"rate-limit":["Rate Limiting","A control that limits actions or requests over a period or resource boundary.","It helps manage abuse and capacity but must be enforced at the correct trusted boundary."],idempotency:["Idempotency","A property that lets the same operation be repeated without unintended additional effects.","It is critical for retries in payments, orders, webhooks, and unreliable networks."],"core-web-vitals":["Core Web Vitals","A set of Google-defined user-experience metrics for loading, interaction responsiveness, and visual stability.","They are useful observed indicators, not a complete measure of site quality or search performance."],"performance-budget":["Performance Budget","An explicit limit for assets, timings, or user-experience metrics that a release should not exceed.","It turns performance into a testable constraint before regressions reach production."]};function eb(){return Qc.map(e=>{let t=Fy[e.id];if(!t)throw new Error(`Missing English technology translation: ${e.id}`);return{...e,...t,category:oh[e.category]??e.category,source:{...e.source,label:`${e.name} documentation`}}})}function tb(){return Xc.map(e=>{let t=Py[e.id];if(!t)throw new Error(`Missing English glossary translation: ${e.id}`);return{...e,term:t[0],aliases:e.aliases?.filter(a=>!/[\u3400-\u9fff]/u.test(a)),category:oh[e.category]??e.category,definition:t[1],whyItMatters:t[2],source:{...e.source,label:"Reference source"}}})}var ab=eb(),nb=tb();function rh(e){return e==="en"?{technologies:ab,glossary:nb}:{technologies:Qc,glossary:Xc}}var ib={"openai-frontend-app-builder":{purpose:"Organizes frontend application implementation inside Codex's web-building plugin.",limitations:"This is a plugin-bundled Skill, not a standalone Skill guaranteed to work when copied elsewhere.",permissions:["May call website-building tools provided by the plugin","May create or modify local code"],installNote:"Find Build Web Apps in Codex Plugins and review its manifest and permissions before installation. This catalog does not provide an unverified shell command."},"openai-frontend-testing-debugging":{purpose:"Provides a plugin workflow nformance to the spec.",limitations:"The repository version may use parallel sub-agents; support depends on the current environment.",permissions:["Read Git diffs and project rules","May call sub-agents","Must not merge automatically"],installNote:"Review its sub-agent requirements before installation; use it as a study checklist when those capabilities are absent."},"matt-prototype":{purpose:"Creates an explicitly disposable prototype for a design or business question.",limitations:"A prototype needs an exit condition and must not silently become production code.",permissions:["Create local prototype files","May start a local server"],installNote:"Install through the project-level Skill directory and state whether the prototype is disposable in the task."},"matt-implement":{purpose:"Drives implementation from a spec or tickets and closes the loop with tests and code review.",limitations:"This is a heavy orchestration workflow and adds unnecessary ceremony to small changes.",permissions:["Broadly modify code","Run tests","May call other Skills or agents","May create commits"],installNote:"Use only when the spec, task boundary, and commit policy are already explicit."},"matt-to-tickets":{purpose:"Breaks a spec into dependent tracer-bullet vertical-slice tasks.",limitations:"Must be adapted to the issue tracker; slices that are too small lose the user outcome.",permissions:["Write to a local or remote issue tracker","May create multiple tasks"],installNote:"Confirm the tracker and write scope before installation. Creating remote issues is an external write."},"addy-spec-driven-development":{purpose:"A study reference for encoding spec-first planning and implementation into agent workflows.",limitations:"The reviewed README does not provide a verified native Codex install command; treat it as a method reference first.",permissions:["No extra permission for reading only","A ported Skill may write documentation"],installNote:"Inspect and port only what is needed. Do not  Coding, and review permissions. Do not use install commands for another agent platform."}},lb="At the review date, the public repository and exact path were reachable. The allowlist updater continues to check archive status and recent pushes.",sb="Maintenance signals use repository-level issues, releases, and commits; repository activity is not treated as a separate version promise for this Skill.",ob="No repository-wide license was clearly identified at review time; inspect the relevant files before use.";function rb(e,t){if(t==="zh")return e;let a=ib[e.id];if(!a)throw new Error(`Missing English Skill translation: ${e.id}`);return{...e,...a,license:e.license==="MIT"?"MIT":ob,maintenanceNote:lb,issueReleaseNote:sb}}function ch(e,t){return t==="zh"?e:{...e,skills:e.skills.map(a=>rb(a,t))}}function Vn(e,t){return e.map(a=>{let n=t[a.id];if(!n)throw new Error(`Missing English option translation: ${a.id}`);return{...a,...n}})}var cb={corporate:{label:"Company website",description:"Explain the business, capabilities, and proof, then capture enquiries."},landing:{label:"Landing page",description:"Focus on one campaign, product, or conversion goal."},portfolio:{label:"Portfolio",description:"Present work and services from a person or team."},blog:{label:"Blog / documentation",description:"Publish articles, tutorials, or product documentation over time."},app:{label:"Web app / SaaS",description:"Let signed-in users complete ongoing tasks online."},ecommerce:{label:"E-commerce",description:"Products, inventory, orders, payments, and after-sales service."},internal:{label:"Internal tool",description:"Team workflows for approvals, data, or operations."}},ub={idea:{label:"Idea only",description:"There is no organized source material yet."},materials:{label:"Materials available",description:"Copy, images, business material, or research already exists."},design:{label:"Design available",description:"Wireframes, a prototype, or visual designs already exist."},code:{label:"Code available",description:"Development has already started."},live:{label:"Live website",description:"The site needs improvement, handover, or ongoing operation."}},db={login:{label:"Sign-in",description:"The site must identify different users."},permissions:{label:"Permissions",description:"Roles can view or change different information."},"personal-data":{label:"Personal data",description:"Names, phone numbers, email addresses, or similar data will be collected."},upload:{label:"File uploads",description:"Users can upload images, documents, or other files."},payment:{label:"Payments / transactions",description:"Payments, refunds, orders, or reconciliation are involved."}},pb={"self-ai":{label:"Me / AI",description:"Content changes infrequently and can be updated through code or files."},developer:{label:"Developer",description:"A person who can code maintains and publishes the content."},operator:{label:"Content operator",description:"A visual editor or CMS is required."},approval:{label:"Multi-person approval",description:"Draft, review, publish, and permission records are required."}},fb={mainland:{label:"Mainland China",description:"Registration, network, cloud-service, and data requirements need separate review."},global:{label:"Global",description:"Prioritize global CDN coverage, international-service compatibility, and multiple languages."},both:{label:"Mainland China and global",description:"Validate network paths, compliance, and third-party availability separately."}},mb={speed:{label:"Fastest launch",description:"Prefer mature managed services and less customization."},cost:{label:"Cost",description:"Prefer static approaches and predictable expenses."},ownership:{label:"Code ownership",description:"Prefer exportable, portable, standards-based technology."},"visual-editing":{label:"Visual editing",description:"Prefer a CMS or builder that non-developers can maintain."},scale:{label:"Complex growth",description:"Prefer explicit boundaries, testing, and scalable infrastructure."}},hb={1:{title:"Define the goal and website type",plainGoal:"State whose problem the website solves and what observable success looks like.",deliverables:["Project brief","Primary-user description","Success measures and boundaries"],gates:{goal:{title:"Goals and non-goals are explicit",help:"Write at least one business goal and what this release will deliberately not include.",evidenceExample:"A project-brief link or an approved goals/non-goals note."},audience:{title:"Primary user and task are confirmed",help:"\u201CEveryone\u201D is not a primary audience. Identify one main user and why they visit.",evidenceExample:"A persona, interview note, or confirmation from the business owner."},success:{title:"Success can be observed",help:"Use outcomes such as a valid enquiry, purchase, or found answer\u2014not \u201Clooks premium.\u201D",evidenceExample:"One to three checkable business or user outcomes."}}},2:{title:"Collect user, business, and content sources",plainGoal:"Prepare verifiable facts, content, and sources so AI does not invent them.",deliverables:["Source register","Content inventory","Gaps and owners"],gates:{sources:{title:"Important facts have sources",help:"Company, product, price, policy, capability, and case-study claims cannot come from AI alone.",evidenceExample:"A source list with date, owner, and public-use scope."},"content-inventory":{title:"Required page content is inventoried",help:"Mark copy, images, and data as available, missing, needing revision, or prohibited from publication.",evidenceExample:"A content spreadsheet or page-by-page asset list."},"content-owner":{title:"Content ownership is assigned",help:"Name who updates and approves content after launch, and how often it is reviewed.",evidenceExample:"Named owners and a review workflow."},"data-inventory":{title:"Personal and sensitive data is inventoried",help:"Record what is collected, why, retention time, and who can access it.",evidenceExample:"A data inventory or pr
